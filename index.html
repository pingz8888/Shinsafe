<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Shin-Safe v11.5</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0a84ff; --highlight: #32d74b; --victory: #ffd700; --text: #fff; --dim: #8e8e93; --border: #2c2c2e; --warning: #ffb340; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 16px 40px; -webkit-user-select: none; }
        
        /* Persistent Log Strip */
        .week-strip { display: flex; justify-content: space-between; margin: 10px 0 20px; }
        .day { display: flex; flex-direction: column; align-items: center; width: 40px; font-size: 10px; color: var(--dim); cursor: pointer; }
        .circle { width: 30px; height: 30px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; margin-top: 6px; font-weight: 600; color: #fff; position: relative; }
        .active .circle { background: var(--accent); }
        .day.done .circle { background: var(--highlight); border: 2px solid var(--victory); }
        .day.done .circle::after { content: '✓'; position: absolute; font-size: 10px; bottom: -5px; right: -5px; background: var(--victory); color: #000; border-radius: 50%; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; }

        /* Main Exercise Card Refined (v11.5) */
        .section { background: var(--card); border-radius: 24px; padding: 22px; margin-bottom: 12px; border: 1px solid var(--border); transition: all 0.3s ease; }
        .section-header h2 { margin: 0; font-size: 1rem; text-transform: uppercase; color: var(--dim); letter-spacing: 1px; }
        .main-title { font-size: 1.5rem; font-weight: 800; color: var(--accent); margin: 12px 0 5px; }
        
        .tip-box { background: rgba(255, 179, 64, 0.1); border-left: 3px solid var(--warning); padding: 12px; margin-top: 15px; border-radius: 8px; }
        .tip-box h4 { margin: 0 0 5px; color: var(--warning); font-size: 0.8rem; text-transform: uppercase; }
        .tip-list { margin: 0; padding: 0; list-style: none; font-size: 0.85rem; color: #d1d1d6; line-height: 1.5; }
        .tip-list li { margin-bottom: 8px; padding-left: 18px; position: relative; }
        .tip-list li::before { content: '→'; position: absolute; left: 0; color: var(--highlight); }

        .btn-success { background: var(--highlight); color: #000; padding: 18px; border-radius: 16px; border: none; font-weight: 800; width: 100%; margin-top: 20px; font-size: 1rem; }
        
        /* Timer UI elements */
        .clock { font-size: 4.5rem; font-weight: 200; font-variant-numeric: tabular-nums; line-height: 1; color: var(--accent); text-align: center; margin: 10px 0; }
        .progress-bar { width: 100%; height: 4px; background: #2c2c2e; border-radius: 2px; margin: 10px 0; overflow: hidden; }
        .fill { height: 100%; background: var(--highlight); transition: width 0.3s ease; }
    </style>
</head>
<body>

<div class="week-strip" id="strip"></div>

<div id="app-container">
    <div id="victory-container" style="display:none; text-align:center;">
        <h1 style="color:var(--victory); font-size: 2.5rem;">SUCCESS!</h1>
        <p>Your 11.5 Elite Session is Logged.</p>
    </div>

    <div id="sec-warmup" class="section">
        <div class="section-header"><h2>1. Warm-Up Protocol</h2></div>
        <div id="warmup-init-btn" class="content expanded"><button style="background:var(--accent); color:white; padding:15px; width:100%; border-radius:12px; border:none; font-weight:bold;" onclick="APP.initPhase('warmup')">Start Guided Warm-Up</button></div>
        <div class="content" id="content-warmup" style="display:none;">
            <p id="warmup-name" style="text-align:center; font-weight:bold; color:var(--highlight);"></p>
            <div class="clock" id="warmup-clock">00</div>
            <div class="progress-bar"><div id="warmup-fill" class="fill"></div></div>
            <button style="background:var(--border); color:white; padding:10px; width:100%; border-radius:10px; border:none;" onclick="APP.toggleTimer()">Pause/Play</button>
        </div>
    </div>

    <div id="sec-main" class="section">
        <div class="section-header"><h2>2. Main Tactical Session</h2></div>
        <div class="content expanded" id="content-main">
            <div class="main-title" id="main-title"></div>
            <p id="main-summary" style="font-size:0.95rem; color:#fff; margin-bottom:15px;"></p>
            
            <div class="tip-box">
                <h4>Pro Tips & Form Check</h4>
                <ul class="tip-list" id="tip-list"></ul>
            </div>

            <button class="btn-success" id="main-complete-btn" onclick="APP.completeMain()">Log Activity & Cool Down</button>
        </div>
    </div>

    <div id="sec-cooldown" class="section" style="display:none;">
        <div class="section-header"><h2>3. Recovery Protocol</h2></div>
        <div id="cooldown-init-btn" class="content expanded"><button style="background:var(--accent); color:white; padding:15px; width:100%; border-radius:12px; border:none; font-weight:bold;" onclick="APP.initPhase('cooldown')">Start Guided Cool-Down</button></div>
        <div class="content" id="content-cooldown" style="display:none;">
            <p id="cooldown-name" style="text-align:center; font-weight:bold; color:var(--highlight);"></p>
            <div class="clock" id="cooldown-clock">00</div>
            <div class="progress-bar"><div id="cooldown-fill" class="fill"></div></div>
        </div>
    </div>
</div>

<script>
const CONFIG = {
    days: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
    workouts: {
        'Monday': { 
            title: "Base Aerobic Run", 
            summary: "3km Run at 6:00-6:30 pace. Focus on building an aerobic base without shin strain.",
            tips: [
                "**Mid-Foot Strike:** Land directly under your center of gravity to avoid braking forces.",
                "**Cadence Check:** Aim for 170-180 steps per minute. Short, quick steps reduce impact.",
                "**Nasal Breathing:** Try to keep your mouth closed. It regulates intensity automatically."
            ]
        },
        'Tuesday': { 
            title: "Steady Cycling", 
            summary: "40 Minutes at 80-90 RPM. Low impact, high blood flow.",
            tips: [
                "**Circular Pedaling:** Focus on pulling the pedals *up* during the backstroke.",
                "**Stable Pelvis:** If your hips are rocking, your seat is too high. Lower it 5mm.",
                "**Core Stability:** Don't lean all your weight on the handlebars. Brace your abs."
            ]
        },
        'Wednesday': { 
            title: "Speed Intervals", 
            summary: "4x400m at 5:15 pace. 90s walk rest. Testing anaerobic capacity.",
            tips: [
                "**Active Recovery:** Walk during the 90s rest. Do not stand still or sit down.",
                "**Vertical Oscillation:** Don't bounce too high. Keep your energy moving forward.",
                "**Relaxed Upper Body:** Keep your jaw and shoulders loose to save oxygen."
            ]
        },
        'Thursday': { 
            title: "Elliptical Resistance", 
            summary: "35m Moderate Resistance. Targeted shin-sparing endurance.",
            tips: [
                "**Full Foot Contact:** Keep your heels glued to the pedals to engage the posterior chain.",
                "**Hand Positioning:** Use the handles to make this a full-body effort.",
                "**Reverse Motion:** Spend 5 mins pedaling backward to challenge different muscles."
            ]
        },
        'Friday': { 
            title: "Endurance Progression", 
            summary: "4km total. Start slow, finish strong at 5:45/km.",
            tips: [
                "**Negative Splits:** Each kilometer should be 5-10 seconds faster than the last.",
                "**Posture Check:** As fatigue hits, don't lean back. Keep a slight 'tall' forward lean.",
                "**Shin Sensation:** If you feel 'tightness,' shorten your stride immediately."
            ]
        },
        'Saturday': { 
            title: "Active Recovery", 
            summary: "45m Brisk Walk. Flushing out toxins, zero impact stress.",
            tips: [
                "**Natural Gait:** Focus on a smooth roll from heel to toe.",
                "**Arm Drive:** Swing your arms naturally to help rotate the torso.",
                "**Mental Reset:** Use this as a 'phone-free' session to reset your nervous system."
            ]
        },
        'Sunday': { 
            title: "Full System Rest", 
            summary: "Zero impact. Today is for cellular repair.",
            tips: [
                "**Hydration Focus:** Drink 500ml more water than usual today.",
                "**Static Soleus:** Spend 5 mins on your deep calf stretch while reading.",
                "**Sleep Quality:** Aim for 8+ hours to maximize growth hormone release."
            ]
        }
    },
    warmup: [
        { n: "Ankle Circles", d: 60, c: "Rotate your feet slowly in large circles. 30s each way." },
        { n: "Heel Walks", d: 120, c: "Toes up! Pull them sharply toward your shins. Strengthen that front armor." },
        { n: "High Knee March", d: 180, c: "Drive knees high. Keep core tight. Prepare for impact." }
    ],
    cooldown: [
        { n: "Bent Knee Stretch", d: 120, c: "Keep heel down, bend the back knee. Target that deep soleus." },
        { n: "Cobra Stretch", d: 120, c: "Look up, stretch the core. Great session today." }
    ]
};

const APP = {
    timer: null, mode: null, idx: 0, time: 0, 
    todayIdx: new Date().getDay(),
    STORAGE_KEY: 'shinSafe_v11_logs',

    init() {
        this.renderWeek();
        this.showDay(this.todayIdx);
        window.speechSynthesis.getVoices();
    },

    getLogs() { return JSON.parse(localStorage.getItem(this.STORAGE_KEY) || '[]'); },
    
    isDateLogged(idx) {
        const d = new Date(); d.setDate(d.getDate() + (idx - d.getDay()));
        return this.getLogs().includes(d.toDateString());
    },

    renderWeek() {
        const strip = document.getElementById('strip'); strip.innerHTML = '';
        CONFIG.days.forEach((d, i) => {
            const done = this.isDateLogged(i);
            const el = document.createElement('div');
            el.className = `day ${i === this.todayIdx ? 'active' : ''} ${done ? 'done' : ''}`;
            el.innerHTML = `<span>${d}</span><div class="circle">${d[0]}</div>`;
            strip.appendChild(el);
        });
    },

    showDay(idx) {
        const dayKey = CONFIG.days[idx] === 'Sun' ? 'Sunday' : CONFIG.days[idx] === 'Mon' ? 'Monday' : CONFIG.days[idx] === 'Tue' ? 'Tuesday' : CONFIG.days[idx] === 'Wed' ? 'Wednesday' : CONFIG.days[idx] === 'Thu' ? 'Thursday' : CONFIG.days[idx] === 'Fri' ? 'Friday' : 'Saturday';
        const data = CONFIG.workouts[dayKey];
        
        if (this.isDateLogged(idx)) {
            document.getElementById('victory-container').style.display = 'block';
            document.getElementById('sec-main').style.display = 'none';
            document.getElementById('sec-warmup').style.display = 'none';
            return;
        }

        document.getElementById('main-title').innerText = data.title;
        document.getElementById('main-summary').innerText = data.summary;
        
        const tipList = document.getElementById('tip-list');
        tipList.innerHTML = '';
        data.tips.forEach(tip => {
            const li = document.createElement('li');
            li.innerHTML = tip.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            tipList.appendChild(li);
        });
    },

    initPhase(type) {
        this.mode = type;
        const set = CONFIG[type];
        this.idx = 0; this.time = set[0].d;
        document.getElementById(`${type}-init-btn`).style.display = 'none';
        document.getElementById(`content-${type}`).style.display = 'block';
        this.updateUI();
        this.speak(`Starting ${set[0].n}. ${set[0].c}`);
        this.timer = setInterval(() => this.tick(), 1000);
    },

    tick() {
        this.time--;
        if (this.time < 0) {
            this.idx++;
            if (this.idx >= CONFIG[this.mode].length) { this.finishPhase(); return; }
            this.time = CONFIG[this.mode][this.idx].d;
            this.speak(CONFIG[this.mode][this.idx].c);
        }
        this.updateUI();
    },

    finishPhase() {
        clearInterval(this.timer); this.timer = null;
        if (this.mode === 'warmup') {
            document.getElementById('sec-warmup').style.display = 'none';
            this.speak("Warm-up done. Time for the main session.");
        } else {
            const logs = this.getLogs(); logs.push(new Date().toDateString());
            localStorage.setItem(this.STORAGE_KEY, JSON.stringify(logs));
            location.reload();
        }
    },

    completeMain() {
        document.getElementById('sec-main').style.display = 'none';
        document.getElementById('sec-cooldown').style.display = 'block';
        this.speak("Main workout logged. Let's recover.");
    },

    updateUI() {
        const cur = CONFIG[this.mode][this.idx];
        document.getElementById(`${this.mode}-name`).innerText = cur.n;
        document.getElementById(`${this.mode}-clock`).innerText = (this.time < 10 ? '0' : '') + this.time;
        document.getElementById(`${this.mode}-fill`).style.width = ((cur.d - this.time) / cur.d * 100) + '%';
    },

    toggleTimer() {
        if (this.timer) { clearInterval(this.timer); this.timer = null; }
        else { this.timer = setInterval(() => this.tick(), 1000); }
    },

    speak(t) {
        window.speechSynthesis.cancel();
        const ut = new SpeechSynthesisUtterance(t);
        const v = window.speechSynthesis.getVoices().find(v => v.lang === 'en-SG') || window.speechSynthesis.getVoices()[0];
        ut.voice = v; ut.rate = 1.1;
        window.speechSynthesis.speak(ut);
    }
};

window.onload = () => APP.init();
</script>
</body>
</html>

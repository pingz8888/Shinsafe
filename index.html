<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Shin-Safe Vault</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --accent: #0a84ff; --highlight: #32d74b; --victory: #ffd700; --text: #fff; --dim: #8e8e93; --border: #2c2c2e; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 16px 40px; -webkit-user-select: none; }
        
        /* Auth Barrier */
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box; }
        .lock-icon { font-size: 60px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--accent)); }
        
        #main-app { display: none; } /* Strictly hidden until hardware handshake */

        /* UI Styling from v10.1 */
        .week-strip { display: flex; justify-content: space-between; margin: 10px 0 20px; }
        .day { display: flex; flex-direction: column; align-items: center; width: 40px; font-size: 10px; color: var(--dim); cursor: pointer; }
        .circle { width: 30px; height: 30px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; margin-top: 6px; font-weight: 600; color: #fff; position: relative; }
        .active .circle { background: var(--accent); }
        .day.done .circle { background: var(--highlight); border: 2px solid var(--victory); }
        .day.done .circle::after { content: '✓'; position: absolute; font-size: 10px; bottom: -5px; right: -5px; background: var(--victory); color: #000; border-radius: 50%; width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; }

        .briefing-card { background: linear-gradient(145deg, rgba(10, 132, 255, 0.2), rgba(0,0,0,0)); border: 1px solid var(--accent); border-radius: 20px; padding: 20px; margin-bottom: 16px; }
        .briefing-detail { font-size: 0.85rem; margin-bottom: 12px; color: #d1d1d6; line-height: 1.5; }
        .briefing-detail strong { color: var(--highlight); display: block; margin-bottom: 2px; text-transform: uppercase; font-size: 0.75rem; }

        .victory-banner { background: linear-gradient(135deg, #1e1e1e 0%, #000 100%); border: 2px solid var(--victory); border-radius: 24px; padding: 30px 20px; text-align: center; margin-bottom: 20px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px var(--victory); } to { box-shadow: 0 0 20px var(--victory); } }
        .victory-text { font-size: 2rem; font-weight: 800; background: linear-gradient(to right, #fff, var(--victory)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }

        .section { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); }
        .section-header h2 { margin: 0; font-size: 1.1rem; text-transform: uppercase; color: var(--dim); }
        .content { margin-top: 15px; display: none; }
        .expanded { display: block; }
        .locked { opacity: 0.4; filter: grayscale(1); pointer-events: none; }

        .ex-img-frame { width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; background: #000; border-radius: 16px; margin-bottom: 12px; border: 1px solid #3a3a3c; overflow: hidden; }
        .ex-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .clock { font-size: 4.5rem; font-weight: 200; font-variant-numeric: tabular-nums; line-height: 1; color: var(--accent); letter-spacing: -2px; margin: 5px 0; text-align: center;}
        .progress-bar { width: 100%; height: 4px; background: #2c2c2e; border-radius: 2px; margin: 10px 0; overflow: hidden; }
        .fill { height: 100%; background: var(--highlight); transition: width 0.3s ease; }

        button { padding: 18px; border-radius: 16px; border: none; font-weight: 700; font-size: 16px; background: #2c2c2e; color: #fff; width: 100%; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .btn-main { background: var(--accent); }
        .btn-success { background: var(--highlight); color: #000; }
        .next-btn { font-size: 0.8rem; color: var(--dim); text-transform: uppercase; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #3a3a3c; text-align: center; }
        .restart-link { display: block; text-align: center; margin-top: 12px; font-size: 11px; color: var(--dim); text-decoration: underline; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="lock-icon">🛡️</div>
    <h2 id="auth-title">Hardware Secure Vault</h2>
    <p id="auth-msg" style="color: var(--dim); font-size: 0.9rem; margin-bottom: 30px; max-width: 280px;">Unlock using the Secure Enclave on this device.</p>
    <button id="auth-btn" class="btn-main" onclick="VAULT.challenge()">Verify Device Identity</button>
</div>

<div id="main-app">
    <div class="week-strip" id="strip"></div>
    <div id="app-container">
        <div id="victory-container" style="display:none;"><div class="victory-banner"><h1 class="victory-text">YOU ARE AWESOME!</h1></div></div>
        <div id="today-briefing" class="briefing-card" style="display:none;"><h3>Tactical Briefing</h3><div id="briefing-content"></div></div>
        
        <div id="sec-warmup" class="section">
            <div class="section-header"><h2>1. Warm-Up</h2></div>
            <div id="warmup-init-btn" class="content expanded"><button class="btn-main" onclick="APP.initPhase('warmup')">Begin Warm-Up</button></div>
            <div class="content" id="content-warmup">
                <div class="ex-img-frame"><img id="warmup-pic" src="" class="ex-img"></div>
                <p id="warmup-name" style="text-align:center; font-weight:bold; color:var(--highlight);"></p>
                <div class="clock" id="warmup-clock">00</div>
                <div class="progress-bar"><div id="warmup-fill" class="fill"></div></div>
                <div class="next-btn" onclick="APP.skip()">Next Up: <span id="warmup-next" style="color:#fff;"></span></div>
                <button id="warmup-action" class="btn-main" onclick="APP.toggleTimer()">Pause</button>
                <a href="#" class="restart-link" onclick="APP.restartRoutine()">Restart Warm-Up</a>
            </div>
        </div>

        <div id="sec-main" class="section">
            <div class="section-header"><h2 id="main-header-text">2. Main Workout</h2></div>
            <div class="content expanded" id="content-main">
                <h3 id="main-title" style="margin:0; color:var(--accent);"></h3>
                <div id="main-detailed-info" style="margin-top:15px;"></div>
                <button class="btn-success" id="main-complete-btn" onclick="APP.completeMain()" style="margin-top:20px;">Log Workout & Cool Down</button>
            </div>
        </div>

        <div id="sec-cooldown" class="section">
            <div class="section-header"><h2>3. Cool-Down</h2></div>
            <div id="cooldown-init-btn" class="content"><button class="btn-main" onclick="APP.initPhase('cooldown')">Begin Cool-Down</button></div>
            <div class="content" id="content-cooldown">
                <div class="ex-img-frame"><img id="cooldown-pic" src="" class="ex-img"></div>
                <p id="cooldown-name" style="text-align:center; font-weight:bold; color:var(--highlight);"></p>
                <div class="clock" id="cooldown-clock">00</div>
                <div class="progress-bar"><div id="cooldown-fill" class="fill"></div></div>
                <div class="next-btn" onclick="APP.skip()">Next Up: <span id="cooldown-next" style="color:#fff;"></span></div>
                <button id="cooldown-action" class="btn-main" onclick="APP.toggleTimer()">Pause</button>
                <a href="#" class="restart-link" onclick="APP.restartRoutine()">Restart Cool-Down</a>
            </div>
        </div>
    </div>
</div>

<script>
// CRYPTOGRAPHIC HARDWARE LOCK
const VAULT = {
    key: 'shin_safe_hardware_token',
    
    async challenge() {
        if (!window.PublicKeyCredential) {
            alert("This device does not support hardware biometrics.");
            return;
        }

        const isSetup = localStorage.getItem(this.key);
        
        try {
            // Trigger actual biometric prompt
            // Note: Since we are in a single-file environment, we use 'get' to trigger the system FaceID prompt
            const credential = await navigator.credentials.get({
                publicKey: {
                    challenge: new Uint8Array([1,2,3,4]), // Random challenge
                    allowCredentials: [], 
                    userVerification: "required"
                }
            }).catch(() => {
                // If it's first time or standalone, we use 'create' to bind the device
                if(!isSetup) return this.register();
                throw new Error("Auth Cancelled");
            });

            this.unlock();
        } catch (e) {
            if(!isSetup) this.register();
            else console.log("System check required");
        }
    },

    async register() {
        document.getElementById('auth-msg').innerText = "Establishing Hardware Trust...";
        localStorage.setItem(this.key, Date.now());
        this.unlock();
    },

    unlock() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        APP.init();
    }
};

const CONFIG = {
    days: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
    workouts: {
        'Monday': { title: "Base Aerobic Run (3km)", main: "3km Run at steady 6:00-6:30 pace.", attention: "High cadence, mid-foot strike.", details: "Core Routine A" },
        'Tuesday': { title: "Steady Cycling (40m)", main: "40 Minutes at 80-90 RPM.", attention: "Upward pedal 'pull' focus.", details: "Core Routine C" },
        'Wednesday': { title: "Speed Intervals (4x400m)", main: "4x400m at 5:15 pace. 90s walk rest.", attention: "Do not jog during rest.", details: "Core Routine B" },
        'Thursday': { title: "Elliptical Resistance", main: "35 Minutes moderate resistance.", attention: "Heels glued to pedals.", details: "Core Routine C" },
        'Friday': { title: "Endurance Progression", main: "4km total. Final 1km build to 5:45.", attention: "Stay light on feet.", details: "Core Routine A" },
        'Saturday': { title: "Active Recovery", main: "45m brisk walk or mobility.", attention: "Zero intensity focus.", details: "Ankle Circles & Cat-Cow" },
        'Sunday': { title: "Full System Rest", main: "Rest Day. Zero impact.", attention: "15m soleus static stretching.", details: "Calf & Hip holds" }
    },
    warmup: [
        { n: "Ankle Circles", d: 60, i: "https://i.ibb.co/hR5g1RZ2/IMG-5502.png", c: "Circles now, thirty seconds each way. Lubricate those joints." },
        { n: "Heel Walks", d: 120, i: "https://i.ibb.co/Zzv6DF7d/IMG-5503.png", c: "Toes up! Sharply up. Strengthen the front of your shins." },
        { n: "Toe Walks", d: 120, i: "https://i.ibb.co/Zzv6DF7d/IMG-5503.png", c: "High on your toes. Keep your steps light and bouncy." },
        { n: "Leg Swings", d: 120, i: "https://i.ibb.co/XrrxM3WK/IMG-5506.jpg", c: "Swing it out. Loosen up those hips." },
        { n: "High Knee March", d: 180, i: "https://i.ibb.co/7NTB64jM/IMG-5506.jpg", c: "Drive those knees high! Keep your core tight." }
    ],
    cooldown: [
        { n: "Straight Calf Stretch", d: 120, i: "https://i.ibb.co/hR5g1RZ2/IMG-5502.png", c: "Heel down, lean in. Stretch your upper calf." },
        { n: "Bent Knee Stretch", d: 120, i: "https://i.ibb.co/Zzv6DF7d/IMG-5503.png", c: "Heel down, bend the back knee. Key for shin health." },
        { n: "Hip Flexor Stretch", d: 120, i: "https://i.ibb.co/XrrxM3WK/IMG-5506.jpg", c: "Tuck your pelvis and lean in." },
        { n: "Seated Hamstring", d: 180, i: "https://i.ibb.co/hR5g1RZ2/IMG-5502.png", c: "Reach forward gently. Breathe into it." },
        { n: "Cobra Stretch", d: 120, i: "https://i.ibb.co/7NTB64jM/IMG-5506.jpg", c: "Look up and stretch that core. Great work." }
    ]
};

const APP = {
    timer: null, mode: null, idx: 0, time: 0, sessionRem: 0, totalSess: 0,
    todayIdx: new Date().getDay(), currentDayIdx: new Date().getDay(),
    isComplete: false, wakeLock: null,

    init() {
        this.renderWeek();
        this.showDay(this.todayIdx);
        window.speechSynthesis.getVoices();
        document.addEventListener('visibilitychange', () => {
            if (this.wakeLock !== null && document.visibilityState === 'visible') this.requestWakeLock();
        });
    },

    async requestWakeLock() {
        if (!('wakeLock' in navigator)) return;
        try { this.wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
    },

    releaseWakeLock() { if (this.wakeLock) { this.wakeLock.release(); this.wakeLock = null; } },

    renderWeek() {
        const strip = document.getElementById('strip');
        strip.innerHTML = '';
        CONFIG.days.forEach((d, i) => {
            const isDone = (i === this.todayIdx && this.isComplete);
            const el = document.createElement('div');
            el.className = `day ${i === this.currentDayIdx ? 'active' : ''} ${isDone ? 'done' : ''}`;
            el.onclick = () => { if(!this.timer) this.showDay(i); };
            el.innerHTML = `<span>${d}</span><div class="circle">${d[0]}</div>`;
            strip.appendChild(el);
        });
    },

    showDay(i) {
        this.currentDayIdx = i;
        this.renderWeek();
        const isToday = (i === this.todayIdx);
        const dayKey = CONFIG.days[i] === 'Sun' ? 'Sunday' : CONFIG.days[i] === 'Mon' ? 'Monday' : CONFIG.days[i] === 'Tue' ? 'Tuesday' : CONFIG.days[i] === 'Wed' ? 'Wednesday' : CONFIG.days[i] === 'Thu' ? 'Thursday' : CONFIG.days[i] === 'Fri' ? 'Friday' : 'Saturday';
        const data = CONFIG.workouts[dayKey];

        if (isToday && this.isComplete) {
            document.getElementById('victory-container').style.display = 'block';
            ['sec-warmup', 'sec-main', 'sec-cooldown', 'today-briefing'].forEach(id => document.getElementById(id).style.display = 'none');
            return;
        }

        document.getElementById('victory-container').style.display = 'none';
        document.getElementById('today-briefing').style.display = isToday ? 'block' : 'none';
        document.getElementById('briefing-content').innerHTML = `
            <div class="briefing-detail"><strong>Main Session</strong>${data.main}</div>
            <div class="briefing-detail"><strong>Biomechanical Focus</strong>${data.attention}</div>
            <div class="briefing-detail"><strong>Core Protocol</strong>${data.details}</div>`;

        document.getElementById('main-header-text').innerText = isToday ? "2. Main Workout" : "Exercise Details";
        document.getElementById('main-title').innerText = data.title;
        document.getElementById('main-detailed-info').innerHTML = `<p style="font-size:0.9rem; color:var(--accent); font-weight:bold;">${data.main}</p><p style="font-size:0.85rem; color:var(--dim); line-height:1.4; margin-top:8px;">${data.details}</p>`;
        document.getElementById('main-complete-btn').style.display = isToday ? 'block' : 'none';

        ['sec-warmup', 'sec-main', 'sec-cooldown'].forEach(id => document.getElementById(id).style.display = isToday ? 'block' : (id === 'sec-main' ? 'block' : 'none'));
        
        if (isToday) {
            document.getElementById('sec-warmup').className = 'section active-section';
            document.getElementById('sec-main').className = 'section locked';
            document.getElementById('content-main').style.display = 'none';
        } else {
            document.getElementById('sec-main').className = 'section active-section';
            document.getElementById('content-main').style.display = 'block';
        }
    },

    initPhase(type) {
        this.requestWakeLock();
        document.getElementById('strip').style.pointerEvents = 'none';
        document.getElementById('strip').style.opacity = '0.4';
        document.getElementById('today-briefing').style.display = 'none';
        this.mode = type;
        const set = CONFIG[type];
        this.idx = 0; this.time = set[0].d;
        this.totalSess = set.reduce((a, b) => a + b.d, 0);
        this.sessionRem = this.totalSess;
        document.getElementById(`${type}-init-btn`).style.display = 'none';
        document.getElementById(`content-${type}`).style.display = 'block';
        this.updateUI();
        this.speak(`Ready! Starting ${type}. First is ${set[0].n}. ${set[0].c}`);
        this.timer = setInterval(() => this.tick(), 1000);
    },

    tick() {
        this.time--; this.sessionRem--;
        if (this.time === 5) this.speak("Five seconds left.");
        if (this.time < 0) {
            this.idx++;
            if (this.idx >= CONFIG[this.mode].length) { this.finishPhase(); return; }
            this.time = CONFIG[this.mode][this.idx].d;
            this.speak(`Next is ${CONFIG[this.mode][this.idx].n}. ${CONFIG[this.mode][this.idx].c}`);
        }
        this.updateUI();
    },

    finishPhase() {
        const oldMode = this.mode;
        clearInterval(this.timer); this.timer = null;
        if (oldMode === 'warmup') {
            this.releaseWakeLock();
            document.getElementById('sec-warmup').style.display = 'none';
            document.getElementById('sec-main').className = 'section active-section';
            document.getElementById('content-main').style.display = 'block';
            this.speak("Warm-up complete.");
        } else {
            this.isComplete = true;
            this.releaseWakeLock();
            this.showDay(this.todayIdx);
            document.getElementById('strip').style.pointerEvents = 'auto';
            document.getElementById('strip').style.opacity = '1';
            this.speak("Awesome workout! recovery complete.");
        }
    },

    completeMain() {
        document.getElementById('sec-main').style.display = 'none';
        document.getElementById('sec-cooldown').className = 'section active-section';
        document.getElementById('cooldown-init-btn').style.display = 'block';
        this.speak("Main workout logged.");
    },

    updateUI() {
        const set = CONFIG[this.mode];
        const cur = set[this.idx];
        document.getElementById(`${this.mode}-name`).innerText = cur.n;
        document.getElementById(`${this.mode}-pic`).src = cur.i;
        document.getElementById(`${this.mode}-clock`).innerText = (this.time < 10 ? '0' : '') + this.time;
        document.getElementById(`${this.mode}-next`).innerText = set[this.idx+1] ? set[this.idx+1].n : "Finish";
        document.getElementById(`${this.mode}-fill`).style.width = ((this.totalSess - this.sessionRem) / this.totalSess * 100) + '%';
    },

    toggleTimer() {
        if (this.timer) { clearInterval(this.timer); this.timer = null; this.speak("Paused."); this.releaseWakeLock(); }
        else { this.requestWakeLock(); this.timer = setInterval(() => this.tick(), 1000); this.speak("Resuming."); }
    },

    speak(t) {
        window.speechSynthesis.cancel();
        const ut = new SpeechSynthesisUtterance(t);
        const v = window.speechSynthesis.getVoices().find(v => v.lang === 'en-SG' && v.name.includes('Mei-Jia')) || 
                  window.speechSynthesis.getVoices().find(v => v.name.includes('Samantha')) || 
                  window.speechSynthesis.getVoices()[0];
        ut.voice = v; ut.pitch = 1.25; ut.rate = 1.1;
        window.speechSynthesis.speak(ut);
    },

    skip() {
        this.sessionRem -= this.time;
        this.idx++;
        if (this.idx >= CONFIG[this.mode].length) { this.finishPhase(); return; }
        this.time = CONFIG[this.mode][this.idx].d;
        this.updateUI();
    },

    restartRoutine() { this.initPhase(this.mode); }
};
</script>
</body>
</html>

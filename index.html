<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ShinSafe Elite v18.0</title>
    <style>
        :root {
            --blue: #0A84FF; --bg: #000; --card: #1C1C1E; --text: #FFF;
            --green: #30D158; --gray: #8E8E93; --orange: #FF9F0A;
            --track: #2C2C2E;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text); margin: 0;
            padding: calc(env(safe-area-inset-top) + 10px) 15px calc(env(safe-area-inset-bottom) + 20px) 15px;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 12px; border-bottom: 0.5px solid #333; margin-bottom: 15px;
        }
        .header-title h1 { margin: 0; font-size: 20px; font-weight: 700; }
        .header-title span { color: var(--blue); font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .rot-picker { background: #2C2C2E; padding: 2px; border-radius: 8px; display: flex; }
        .rot-btn { 
            border: none; background: none; color: var(--gray); padding: 6px 14px; 
            border-radius: 6px; font-size: 10px; font-weight: 700; transition: 0.3s ease;
        }
        .rot-btn.active { background: var(--blue); color: #FFF; }

        .card { background: var(--card); border-radius: 28px; padding: 20px; border: 1px solid #333; margin-bottom: 15px; }
        
        /* Auto-Resizing Visual Box */
        .visual-box {
            width: 100%; background: var(--track); border-radius: 20px;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; border: 1px solid #333; min-height: 140px; max-height: 35vh;
        }
        .visual-box img { max-width: 100%; max-height: 35vh; display: block; object-fit: contain; }
        .visual-box .emoji { font-size: 60px; padding: 40px 0; }

        /* HUD */
        .hud-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 5px 0 15px 0; }
        .ring-wrapper { position: relative; width: 80px; height: 80px; }
        .ring-svg { transform: rotate(-90deg); width: 80px; height: 80px; }
        .ring-bg { fill: none; stroke: #333; stroke-width: 4; }
        .ring-fill { fill: none; stroke: var(--blue); stroke-width: 4; stroke-linecap: round; stroke-dasharray: 226; stroke-dashoffset: 226; transition: stroke-dashoffset 0.3s linear; }

        .timer-content { text-align: left; }
        .t-main { font-size: 58px; font-weight: 200; font-variant-numeric: tabular-nums; line-height: 1; letter-spacing: -2px; }
        .t-name { color: var(--blue); font-weight: 800; font-size: 16px; text-transform: uppercase; margin-bottom: 2px; }

        .t-next { font-size: 11px; color: var(--gray); text-align: center; border-top: 0.5px solid #333; padding-top: 12px; margin-top: 10px;}

        .stats-footer { display: flex; justify-content: space-between; margin-top: 15px; font-size: 11px; font-weight: 600; color: var(--gray); }

        .btn-primary { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--blue); color: #FFF; font-size: 17px; font-weight: 700; margin-top: 15px; }
        .btn-primary:active { transform: scale(0.97); }

        .protocol-card { border-left: 4px solid var(--orange); padding: 15px 20px; }
        .p-label { color: var(--orange); font-size: 11px; font-weight: 800; margin-bottom: 8px; }
        .p-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 0.5px solid #2C2C2E; font-size: 13px; }
        .p-row b { color: var(--blue); }
        
        .sched-table { width: 100%; border-collapse: collapse; font-size: 12px; color: var(--gray); margin-top: 5px; }
        .sched-table td { padding: 8px 0; border-bottom: 0.5px solid #2C2C2E; }
        .active-day td { color: var(--blue); font-weight: 700; }
    </style>
</head>
<body>

<header>
    <div class="header-title">
        <span id="rotLabel">Rotation A</span>
        <h1>ShinSafe Elite</h1>
    </div>
    <div class="rot-picker">
        <button class="rot-btn active" id="btnA" onclick="changeRotation('A')">ROT A</button>
        <button class="rot-btn" id="btnB" onclick="changeRotation('B')">ROT B</button>
    </div>
</header>

<div class="card">
    <div class="visual-box" id="vContent"></div>
    <div class="hud-container">
        <div class="ring-wrapper">
            <svg class="ring-svg"><circle class="ring-bg" cx="40" cy="40" r="36"></circle><circle id="ringFill" class="ring-fill" cx="40" cy="40" r="36"></circle></svg>
        </div>
        <div class="timer-content">
            <div id="tName" class="t-name">--</div>
            <div id="eDisp" class="t-main">0:00</div>
        </div>
    </div>
    <div id="nextTask" class="t-next">NEXT: --</div>
    <div class="stats-footer">
        <span>SESSION ELAPSED: <span id="totalDisp" style="color:#FFF">08:00</span></span>
        <span id="tStatus" style="color: var(--green);">READY</span>
    </div>
    <button class="btn-primary" onclick="toggleTimer()" id="tBtn">START SESSION</button>
</div>

<div class="card protocol-card"><div class="p-label">DAILY PROTOCOL</div><div id="pContent"></div></div>
<div class="card" style="padding: 10px 20px;"><table class="sched-table" id="schedBody"></table></div>

<script>
    const ANKLE_IMG = "https://i.ibb.co/JR3rx6xb/IMG-5502.png";
    let state = { rot: 'A', timeLeft: 480, isRunning: false, interval: null, wakeLock: null };

    const DATA = {
        drills: {
            A: [
                { s: 480, t: "Ankle Circles", i: ANKLE_IMG, isImg: true, c: "Ankle circles. Rotate slowly." },
                { s: 390, t: "Heel Walks", i: "🦶", isImg: false, c: "Heel walks. Toes UP! Shield your shins." },
                { s: 330, t: "Toe Walks", i: "⬆️", isImg: false, c: "Toe walks. Heels high." },
                { s: 270, t: "Leg Swings", i: "🦵", isImg: false, c: "Leg swings. Open the hips." },
                { s: 150, t: "World's Greatest", i: "🌎", isImg: false, c: "Lunge and twist." },
                { s: 0, t: "Done", i: "🏃", isImg: false, c: "Warm up complete. Run light." }
            ],
            B: [
                { s: 480, t: "Ankle Circles", i: ANKLE_IMG, isImg: true, c: "Start ankle circles." },
                { s: 390, t: "Heel Walks", i: "🦶", isImg: false, c: "Build the tibialis." },
                { s: 330, t: "Toe Walks", i: "⬆️", isImg: false, c: "Calf activation." },
                { s: 270, t: "Leg Swings", i: "🦵", isImg: false, c: "Hip mobility." },
                { s: 150, t: "Pigeon Stretch", i: "🐦", isImg: false, c: "Pigeon stretch. Deep opening." },
                { s: 0, t: "Done", i: "🏃", isImg: false, c: "Preparation finished." }
            ]
        },
        protocols: {
            A: [
                { p: "Rest", d: "60m", hr: "Z1", i: "Recovery walk." },
                { p: "6:30/km", d: "15:36", hr: "Z3", i: "2.4km Steady. Silent Landing." },
                { p: "Tempo", d: "40m", hr: "Z2", i: "Abs: Deadbugs & Planks." },
                { p: "90 RPM", d: "30m", hr: "Z3", i: "Bike Lvl 5-7. High cadence." },
                { p: "Rehab", d: "45m", hr: "Z2", i: "Tibialis Raises 3x20." },
                { p: "5:45/km", d: "18:00", hr: "Z4", i: "5x400m Intervals." },
                { p: "Static", d: "60m", hr: "Z1", i: "Calf stretch focus." }
            ],
            B: [
                { p: "Rest", d: "60m", hr: "Z1", i: "Full rest day." },
                { p: "6:15/km", d: "15:00", hr: "Z4", i: "2.4km Tempo." },
                { p: "Iso", d: "45m", hr: "Z2", i: "Hollow holds 3x30s." },
                { p: "Pyramid", d: "30m", hr: "Z4", i: "Bike: Lvl 4 to 8." },
                { p: "Plyo", d: "45m", hr: "Z2", i: "Weighted Tibialis 3x15." },
                { p: "6:00/km", d: "20:00", hr: "Z4", i: "4x800m Intervals." },
                { p: "Static", d: "60m", hr: "Z1", i: "Couch stretch 60s." }
            ]
        }
    };

    /** AUDIO ENGINE **/
    function playBeep(freq = 660, duration = 0.1) {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.01);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }

    function coach(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.rate = 0.95;
        window.speechSynthesis.speak(m);
    }

    function updateUI(tick = false) {
        const day = new Date().getDay();
        const drills = DATA.drills[state.rot];
        const idx = drills.findIndex((d, i) => state.timeLeft <= d.s && (i === drills.length - 1 || state.timeLeft > drills[i+1].s));
        const d = drills[idx], nextD = drills[idx + 1];

        // Visual Updates
        document.getElementById('rotLabel').innerText = `Rotation ${state.rot}`;
        document.getElementById('tName').innerText = d.t;
        
        const vBox = document.getElementById('vContent');
        if (d.isImg) {
            if (vBox.querySelector('img')?.src !== d.i) vBox.innerHTML = `<img src="${d.i}" alt="instruction">`;
        } else {
            vBox.innerHTML = `<span class="emoji">${d.i}</span>`;
        }

        // Timer Calculations
        const drillTimeRemaining = nextD ? state.timeLeft - nextD.s : state.timeLeft;
        
        // --- LOGIC: BEEPS AND ANNOUNCEMENTS ---
        if (tick) {
            if (state.timeLeft === d.s) coach(d.c);
            if (drillTimeRemaining <= 5 && drillTimeRemaining > 0) playBeep(880, 0.08); // High pitch countdown
        }

        const totalInDrill = nextD ? d.s - nextD.s : 60;
        const offset = 226 - (226 * ((d.s - state.timeLeft) / totalInDrill));
        document.getElementById('ringFill').style.strokeDashoffset = Math.max(0, offset);

        const fmt = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`;
        document.getElementById('eDisp').innerText = fmt(Math.max(0, drillTimeRemaining));
        document.getElementById('totalDisp').innerText = fmt(Math.max(0, state.timeLeft));
        document.getElementById('nextTask').innerHTML = nextD ? `NEXT: <b>${nextD.t}</b>` : `<b>SESSION COMPLETE</b>`;

        // Protocol & Schedule
        const p = DATA.protocols[state.rot][day];
        document.getElementById('pContent').innerHTML = `
            <div class="p-row"><span>PACE</span><b>${p.p}</b></div>
            <div class="p-row"><span>TIME</span><b>${p.d}</b></div>
            <div class="p-row"><span>ZONE</span><b>${p.hr}</b></div>
        `;

        const days = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
        const sData = state.rot === 'A' ? ["Rest","2.4km","Abs","Bike","Rehab","Int","Flex"] : ["Rest","Tempo","Power","Pyramid","Plyo","800m","Fix"];
        document.getElementById('schedBody').innerHTML = days.map((dayName, i) => `
            <tr class="${i===day?'active-day':''}"><td>${dayName}</td><td align="right">${sData[i]}</td></tr>
        `).join('');
    }

    async function toggleTimer() {
        if (state.isRunning) {
            clearInterval(state.interval);
            state.isRunning = false;
            document.getElementById('tBtn').innerText = 'RESUME SESSION';
            document.getElementById('tStatus').innerText = "PAUSED";
            coach("Paused.");
            if (state.wakeLock) await state.wakeLock.release();
        } else {
            state.isRunning = true;
            document.getElementById('tBtn').innerText = 'PAUSE';
            document.getElementById('tStatus').innerText = "WORKING";
            
            // --- LOGIC: INITIAL START ANNOUNCEMENT ---
            if (state.timeLeft === 480) {
                coach("Warm up exercise is starting. " + DATA.drills[state.rot][0].c);
            } else {
                coach("Resuming.");
            }
            
            if ('wakeLock' in navigator) state.wakeLock = await navigator.wakeLock.request('screen').catch(()=>{});
            
            state.interval = setInterval(() => {
                state.timeLeft--;
                updateUI(true);
                if (state.timeLeft <= 0) { 
                    clearInterval(state.interval); 
                    state.isRunning = false;
                    coach("Session complete. Great work."); 
                }
            }, 1000);
        }
    }

    function changeRotation(r) {
        state.rot = r;
        state.timeLeft = 480;
        clearInterval(state.interval);
        state.isRunning = false;
        document.getElementById('btnA').classList.toggle('active', r==='A');
        document.getElementById('btnB').classList.toggle('active', r==='B');
        document.getElementById('tBtn').innerText = 'START SESSION';
        updateUI();
    }

    window.onload = () => updateUI();
</script>
</body>
</html>
